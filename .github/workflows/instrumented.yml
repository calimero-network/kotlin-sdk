name: Instrumented Tests

# Android instrumented tests (the analog of Swift's XCUITest): builds the Compose
# sample app and drives login → home → RPC → logout in an Android emulator against
# an IN-APP MOCK (no node). This is the PR gate for UI behaviour.
#
# Node-backed / multi-user e2e is heavier (real merod, cross-user sync) and does
# NOT run here — it lives in android-e2e.yml (manual / main / weekly).
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  instrumented-tests:
    name: connectedDebugAndroidTest (emulator, in-app mock)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Hardware acceleration for the emulator. Without KVM the x86_64 emulator
      # boots under software rendering only and is far too slow.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # AVD snapshot cache (per the android-emulator-runner README): the first run
      # creates and snapshots the AVD, later runs restore it and boot faster.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api30-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests (in-app mock)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # NOTE: android-emulator-runner runs this script with /usr/bin/sh (dash), which does
          # NOT support `set -o pipefail`. Redirect to a log file (instead of piping through tee)
          # so the gradle exit code propagates and a real test failure fails the job.
          # Single-line gradle invocation: the action runs this under sh and backslash line
          # continuations don't survive (the `\` gets passed to gradle as a task name).
          # In-app mock only — node/multi-user e2e classes run in android-e2e.yml; filter them out.
          script: |
            ./gradlew :sample-app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.notClass=com.calimero.mero.sample.AppE2ETest,com.calimero.mero.sample.ChatMultiUserTest --stacktrace > instrumented.log 2>&1 || { cat instrumented.log; exit 1; }
            cat instrumented.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-logs
          path: |
            instrumented.log
            sample-app/build/reports/androidTests/
            sample-app/build/outputs/androidTest-results/
          if-no-files-found: warn
