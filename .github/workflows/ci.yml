name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint + detekt
        run: ./gradlew ktlintCheck detekt --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Android Lint
        run: ./gradlew lint --stacktrace

      - name: Assemble
        run: ./gradlew assembleDebug --stacktrace

      # The instrumented suites don't run here (no emulator on this job), but they
      # must at least compile — otherwise a UI rename silently rots the e2e tests
      # until the nightly emulator job runs.
      - name: Compile instrumented tests
        run: ./gradlew :sample-app:assembleDebugAndroidTest --stacktrace

      # Guard the SDK↔sample parity this repo is built on: every public SDK method
      # should be reachable from the sample app's operation registry.
      - name: SDK surface / registry parity
        run: ./ci/check-registry-parity.sh

      - name: Validate merobox scenarios
        run: |
          python -m pip install --upgrade pip
          pip install merobox
          for wf in ci/merobox/*.yml; do
            echo "── $wf"
            merobox bootstrap validate "$wf"
          done

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/ktlint/
            **/build/reports/detekt/
            **/build/reports/lint-results-*.html
          if-no-files-found: ignore
