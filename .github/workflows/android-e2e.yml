name: Android E2E (vs live merod)

# End-to-end Android tests against a REAL merod node (heavier than the in-app-mock
# instrumented run in instrumented.yml, so this runs on main pushes / manually /
# weekly, not on every PR). Two jobs:
#   * single-node — full-feature AppE2ETest (login → explorer → chat) on 1 node + 1 emulator.
#   * multi-node  — two nodes + two emulators, cross-user chat (ChatMultiUserTest),
#     driven by chat-multi-e2e.sh. Allowed to fail: cross-node gossipsub between
#     two co-located merods is unreliable on a single host, so this job is
#     informational until that (core-side) settles.
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  single-node-e2e:
    name: Full-feature e2e (1 node / 1 emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download released merod (x86_64-unknown-linux-gnu)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName -q '.[0].tagName')
          URL=$(gh release view "$TAG" --repo calimero-network/core --json assets \
            -q '.assets[] | select(.name | test("merod_x86_64-unknown-linux-gnu\\.tar\\.gz$")) | .url')
          test -n "$URL" || { echo "no merod linux asset on $TAG"; exit 1; }
          curl -sL "$URL" | tar xz && chmod +x ./merod && sudo mv ./merod /usr/local/bin/merod
          merod --version

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api30-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run AppE2ETest (boots node, reuses the emulator)
        # android-e2e.sh boots merod on :4001 and reuses the emulator that this
        # action has already booted (it starts its own only when none is running).
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./android-e2e.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-single-node
          path: |
            .e2e-android.log
            .e2e-logcat.log
            .mero-e2e-node.log
            sample-app/build/reports/androidTests/
          if-no-files-found: warn

  multi-node-e2e:
    name: Multi-user chat e2e (2 nodes / 2 emulators)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Informational: cross-node sync between co-located merods is flaky on one host.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download released merod (x86_64-unknown-linux-gnu)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release list --repo calimero-network/core --limit 1 --json tagName -q '.[0].tagName')
          URL=$(gh release view "$TAG" --repo calimero-network/core --json assets \
            -q '.assets[] | select(.name | test("merod_x86_64-unknown-linux-gnu\\.tar\\.gz$")) | .url')
          test -n "$URL" || { echo "no merod linux asset on $TAG"; exit 1; }
          curl -sL "$URL" | tar xz && chmod +x ./merod && sudo mv ./merod /usr/local/bin/merod

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api30-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run chat-multi-e2e.sh (2 nodes, 2 emulators)
        # This action boots one emulator; chat-multi-e2e.sh boots a second instance
        # and both merod nodes, then runs the host/guest/verify roles.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./chat-multi-e2e.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-multi-node
          path: |
            .mero-a.log
            .mero-b.log
            .mero-role-*.log
          if-no-files-found: warn
